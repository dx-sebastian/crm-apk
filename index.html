<!doctype html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CRM Comercial</title>
<style>
  :root{
    --p:#1a73e8; --pl:#60a5fa; --pd:#1e40af;
    --ink:#0f172a; --soft:#64748b; --line:#e8edf5; --panel:#f6f9ff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,var(--pl) 0%,var(--p) 46%,var(--pd) 100%);
    background-attachment:fixed;
    display:flex; flex-direction:column; align-items:center;
    padding:44px 20px 40px;
  }
  .brandwrap{text-align:center; color:#fff; margin-bottom:26px;}
  .tile{
    width:72px; height:72px; border-radius:20px; margin:0 auto 16px;
    background:#fff; box-shadow:0 12px 30px rgba(10,30,80,.28);
    display:flex; align-items:flex-end; justify-content:center; gap:6px; padding:16px 15px;
  }
  .tile i{width:9px; border-radius:3px; display:block;}
  .tile i:nth-child(1){height:40%; background:var(--pl);}
  .tile i:nth-child(2){height:70%; background:var(--p);}
  .tile i:nth-child(3){height:100%; background:var(--pd);}
  .brand{font-size:30px; font-weight:800; letter-spacing:.5px; margin:0;}
  .tag{font-size:14px; opacity:.9; margin-top:2px; font-weight:500;}

  .card{
    width:100%; max-width:440px; background:#fff; border-radius:24px;
    box-shadow:0 24px 60px rgba(8,24,68,.28); padding:26px 24px; text-align:center;
  }
  .verrow{display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; margin-bottom:4px;}
  .vpill{font-weight:800; font-size:14px; color:var(--p); background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:5px 12px;}
  .meta{color:var(--soft); font-size:12.5px;}
  .notes{color:var(--soft); font-size:13.5px; line-height:1.5; margin:14px 2px 20px;}
  .btn{
    display:block; width:100%; border:0; cursor:pointer;
    background:var(--p); color:#fff; font-size:17px; font-weight:800;
    padding:17px; border-radius:16px; text-decoration:none;
    box-shadow:0 10px 22px rgba(26,115,232,.35); transition:transform .05s, background .15s;
  }
  .btn:active{transform:translateY(1px); background:var(--pd);}
  .btn[aria-disabled="true"]{opacity:.45; pointer-events:none; box-shadow:none;}
  .again{color:var(--soft); font-size:12px; margin-top:12px;}

  .steps{width:100%; max-width:440px; margin-top:18px;}
  .step{display:flex; align-items:flex-start; gap:12px; color:#fff; padding:9px 4px;}
  .num{flex:0 0 26px; height:26px; border-radius:50%; background:rgba(255,255,255,.18); color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; margin-top:1px;}
  .step p{margin:0; font-size:14px; line-height:1.45; opacity:.96;}
  .step b{font-weight:700;}
  .foot{color:rgba(255,255,255,.75); font-size:12px; margin-top:26px;}
</style></head>
<body>
  <div class="brandwrap">
    <div class="tile"><i></i><i></i><i></i></div>
    <h1 class="brand">CRM</h1>
    <div class="tag">Disex · Acciones en campo</div>
  </div>

  <main class="card">
    <div class="verrow">
      <span class="vpill" id="ver">···</span>
      <span class="meta" id="meta"></span>
    </div>
    <p class="notes" id="notes"></p>
    <a class="btn" id="dl" href="#" aria-disabled="true">Descargar</a>
    <div class="again">Vuelve aquí para actualizar a la última versión.</div>
  </main>

  <section class="steps">
    <div class="step"><span class="num">1</span><p>Toca <b>Descargar</b> y abre el archivo.</p></div>
    <div class="step"><span class="num">2</span><p>Si aparece, permite instalar desde el navegador.</p></div>
    <div class="step"><span class="num">3</span><p>Toca <b>Instalar</b>. Para actualizar, repite desde aquí.</p></div>
  </section>

  <div class="foot">Diseños Exclusivos S.A.S.</div>

<script>
  (function(){
    var mb=function(b){return (b/1048576).toFixed(1)+' MB';};
    fetch('manifest.json?t='+Date.now()).then(function(r){return r.json();}).then(function(m){
      var file=m.fileName||'app-release.apk';
      document.getElementById('ver').textContent='v'+m.version;
      document.getElementById('meta').textContent=[m.sizeBytes?mb(m.sizeBytes):'', m.publishedAt||''].filter(Boolean).join(' · ');
      document.getElementById('notes').textContent=m.notes||'';
      var dl=document.getElementById('dl');
      dl.href=file; dl.setAttribute('download',file); dl.setAttribute('aria-disabled','false');
    }).catch(function(){ document.getElementById('ver').textContent='—'; document.getElementById('notes').textContent='No se pudo cargar la versión.'; });
  })();
</script>
</body></html>
